services:

  backend:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: mangaion-backend
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: mangaion-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: .docker/node/Dockerfile
    container_name: mangaion-frontend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true

  postgres:
    image: postgres:15
    container_name: mangaion-postgres
    environment:
      POSTGRES_DB: mangaion
      POSTGRES_USER: mangaion
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
